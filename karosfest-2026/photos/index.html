<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Photos – Karo's Fest 2026</title>

    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/css/lightgallery-bundle.min.css"
    />

    <style>
        #protected-content {
            display: none;
        }
    </style>
</head>
<body class="bg-white text-neutral-800">

    <!-- PASSWORD SCREEN -->
    <div
        id="password-screen"
        class="min-h-screen flex items-center justify-center px-6"
    >
        <div class="max-w-md w-full text-center">

            <h1 class="text-3xl font-light mb-6">
                Photo Gallery
            </h1>

            <p class="text-neutral-600 mb-8">
                Please enter the password to view the photos.
            </p>

            <input
                type="password"
                id="password-input"
                placeholder="Password"
                class="w-full border border-neutral-300 rounded px-4 py-3 mb-4"
            >

            <button
                onclick="checkPassword()"
                class="w-full bg-neutral-900 text-white px-6 py-3 rounded hover:bg-neutral-700 transition"
            >
                Enter
            </button>

            <p
                id="error-message"
                class="hidden text-red-600 mt-4"
            >
                Incorrect password.
            </p>

        </div>
    </div>

    <!-- PROTECTED CONTENT -->
    <div id="protected-content">

        <section class="max-w-6xl mx-auto px-6 py-16">

            <h1 class="text-4xl font-light text-center mb-4">
                Photos
            </h1>

            <p class="text-center text-neutral-600 mb-12">
                Memories from Karo's Fest
            </p>

            <div
                id="lightgallery"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"
            >

                <a href="images/photo01.jpg">
                    <img
                        src="images/photo01.jpg"
                        alt=""
                        class="w-full h-72 object-cover rounded"
                    >
                </a>

                <a href="images/photo02.jpg">
                    <img
                        src="images/photo02.jpg"
                        alt=""
                        class="w-full h-72 object-cover rounded"
                    >
                </a>

                <a href="images/photo03.jpg">
                    <img
                        src="images/photo03.jpg"
                        alt=""
                        class="w-full h-72 object-cover rounded"
                    >
                </a>

                <!-- Add more photos here -->

            </div>

        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/lightgallery@2.7.2/lightgallery.min.js"></script>

    <script>
        function showContent() {
            document.getElementById("password-screen").style.display = "none";
            document.getElementById("protected-content").style.display = "block";

            lightGallery(document.getElementById("lightgallery"), {
                speed: 300,
                download: false,
                counter: true
            });
        }

        function checkPassword() {
            const password = "sauerteigbrot";
            const input = document.getElementById("password-input").value;

            if (input === password) {

                localStorage.setItem("karosFestAccess", "granted");

                showContent();

            } else {

                document
                    .getElementById("error-message")
                    .classList.remove("hidden");

            }
        }

        window.onload = function () {

            if (
                localStorage.getItem("karosFestAccess") === "granted"
            ) {
                showContent();
            }

        };
    </script>

</body>
</html>
