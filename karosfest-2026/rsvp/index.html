<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RSVP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.tailwindcss.com"></script>
</head>

  

<body class="bg-neutral-50 text-neutral-800 font-sans">

<section class="min-h-screen flex items-center justify-center px-6 py-12">

<div class="w-full max-w-md">

<h1 class="text-3xl font-light text-center mb-8">
RSVP
</h1>

  

<form action="https://formspree.io/f/xlgpdepy" method="POST" class="space-y-6">
  <input type="hidden" name="_redirect" value="https://karowiesner.github.io/karosfest-2026/rsvp/thank-you/">

<!-- Name -->
<div class="flex flex-col>
<label class="block text-sm mb-2">Name</label>
<input type="text" name="name" required
class="w-full border border-neutral-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-neutral-600">
</div>

  

<!-- Email 
<div>
<label class="block text-sm mb-2">Email</label>
<input type="email" name="email"
class="w-full border border-neutral-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-neutral-600">
</div>
  -->

<!-- Attendance -->
<div class="flex flex-col>
<label class="block text-sm mb-2">Attendance / Teilnahme</label>

  <div class="flex flex-col gap-2">

<label class="flex items-center gap-3 py-2">
    <!-- flex items-center space-x-3 py-2 -->
<input type="radio" name="attendance" value="Yes" required>
<span>Attending All Days / Komme all drei Tage</span>
</label>
    <label class="flex items-center space-x-3 py-2">
<input type="radio" name="attendance" value="Friday" required>
<span>Attending Friday Only / Komme nur Freitag</span>
</label>

  <label class="flex items-center space-x-3 py-2">
<input type="radio" name="attendance" value="Saturday" required>
<span>Attending Saturday Only / Komme nur Samstag</span>
</label>
  
    <label class="flex items-center space-x-3 py-2">
<input type="radio" name="attendance" value="Sunday" required>
<span>Attending Sunday Only / Komme nur Sonntag</span>
</label>

      <label class="flex items-center space-x-3 py-2">
<input type="radio" name="attendance" value="maybe" required>
<span>Not sure yet / Ich weiss es noch nicht</span>
</label>

<label class="flex items-center space-x-3 py-2">
<input type="radio" name="attendance" value="No">
<span>Sadly I cannot attend / Ich kann leider nicht kommen</span>
</label>

  </div>

</div>

<!-- Guests -->
<div class="flex flex-col">

<label class="text-sm mb-3">Number / Anzahl</label>

<div class="flex flex-col gap-2">

<label class="flex items-center gap-3 py-2">
<input type="radio" name="guest_option" value="alone">
<span>Coming on my own / Ich komme alleine</span>
</label>

<label class="flex items-center gap-3 py-2">
<input type="radio" name="guest_option" value="bringing_people">
<span>Bringing the following people / Ich bringe folgende Personen mit</span>
</label>

</div>

<textarea
name="guest_names"
rows="3"
placeholder="Names of additional guests"
class="mt-3 border border-neutral-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-neutral-600">
</textarea>

</div>
  
<!-- Hotel 
<div>
<label class="block text-sm mb-2">Hotel Needed?</label>

<label class="flex items-center space-x-3 py-2">
<input type="checkbox" name="hotel" value="Yes">
<span>I would like hotel recommendations</span>
</label>
</div>
  -->


<!-- Notes -->
<div class="flex flex-col>
<label class="block text-sm mb-2">Notes, Dietary Requirements / Notizen zu Ernährung und sonstigem </label>
<textarea name="message" rows="4"
class="w-full border border-neutral-300 rounded-lg px-4 py-3 text-base focus:outline-none focus:border-neutral-600"></textarea>
</div>

<!-- Submit -->
<button
class="w-full bg-neutral-800 text-white py-3 rounded-full text-base hover:bg-black transition">
Send RSVP
</button>

</form>

<div class="text-center mt-8">
<a href="/karosfest-2026/" class="text-sm text-neutral-500 hover:underline">
Back to event page / Zurück zur Hauptseite
</a>
</div>

</div>

</section>

</body>
</html>
